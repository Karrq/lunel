name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'
      
      - name: Install dependencies
        working-directory: ./app
        run: |
          npm ci --legacy-peer-deps
          npx expo prebuild --platform ios --clean
      
      - name: Install CocoaPods
        working-directory: ./app/ios
        run: |
          sudo gem install cocoapods
          pod install --repo-update
      
      - name: Build unsigned IPA
        working-directory: ./app/ios
        run: |
          # Auto-detect scheme name
          SCHEME=$(xcodebuild -list -workspace *.xcworkspace 2>/dev/null | awk '/Schemes:/{getline; print $1}' | xargs)
          [[ -z "$SCHEME" ]] && SCHEME="Lunel"
          echo "Building scheme: $SCHEME"
          
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/Lunel.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO
          
          # Package as IPA
          mkdir -p Payload
          cp -r build/Lunel.xcarchive/Products/Applications/*.app Payload/ 2>/dev/null || \
            cp -r build/Lunel.xcarchive/Products/Applications/Lunel.app Payload/
          cd Payload && zip -r ../Lunel-unsigned.ipa . && cd ..
          rm -rf Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lunel-unsigned
          path: ./app/ios/Lunel-unsigned.ipa
          retention-days: 30
      
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./app/ios/Lunel-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
